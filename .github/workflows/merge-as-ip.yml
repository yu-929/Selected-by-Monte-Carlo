name: Merge AS TXT to ip.txt
on:
  push:
    # 仓库任意文件修改时触发
    branches: [ main ]
    paths:
      - 'as*.txt'
      - 'ip.txt'
  # 手动运行
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 合并as开头文件并去重写入ip.txt
        run: |
          # 1. 合并所有as*.txt，sort -u 全局去重，覆盖ip.txt
          cat as*.txt | sort -u > ip.txt
          # 可选：删除空行（IP列表常用）
          sed -i '/^$/d' ip.txt
          echo "合并完成，已去重并清理空行"
          cat ip.txt

      - name: 提交更新后的ip.txt
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ip.txt
          # 有变更才提交推送
          if git diff --cached --quiet; then
            echo "ip.txt无变化，无需提交"
          else
            git commit -m "auto merge all as*.txt and deduplicate to ip.txt"
            git push
          fi