name: Merge AS TXT to ip.txt
on:
  push:
    branches: [ main ]
    paths:
      - '[aA][sS]*.txt'
      - 'ip.txt'
  workflow_dispatch:

# 写入仓库权限
permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库完整代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 批量合并AS/ as开头文件、格式化、去重
        run: |
          # 匹配大小写 as/AS As aS 所有txt文件
          FILES=([aA][sS]*.txt)
          
          # 判断是否存在匹配文件，无文件直接退出不报错
          if [ ! -f "${FILES[0]}" ]; then
            echo "未找到任何 as/AS 开头txt文件，终止合并"
            exit 0
          fi

          # 核心处理流程
          cat "${FILES[@]}" \
          # 去除行首数字+空格  123 1.1.1.1#xxx-JP → 1.1.1.1#xxx-JP
          | sed -E 's/^[0-9]+\s+//' \
          # 过滤不含#的脏数据行
          | awk '/#/' \
          # 按#分割，取第一段IP端口，拆分第二段取国家码拼接 IP#国家码
          | awk -F '#' '{split($2,tag,"-"); if(tag[2]!="") print $1"#"tag[2]}' \
          # 全局排序去重
          | sort -u \
          # 删除空行
          | sed '/^$/d' > ip.txt

          echo "=== 处理完成 ==="
          echo "原始文件列表: ${FILES[*]}"
          echo "ip.txt 总行数: $(wc -l ip.txt)"

      - name: 提交并推送更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ip.txt
          
          # 无变更直接跳过提交
          if git diff --cached --quiet; then
            echo "ip.txt 内容无变更，跳过提交推送"
          else
            git commit -m "auto merge & format all AS/as*.txt deduplicate to ip.txt"
            git push
            echo "已推送最新 ip.txt 至 main 分支"
          fi