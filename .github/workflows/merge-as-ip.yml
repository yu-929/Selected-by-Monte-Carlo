name: Merge AS TXT to ip.txt
on:
  push:
    branches: [ main ]
    paths:
      - '*as*.txt'
      - '*AS*.txt'
      - 'ip.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取完整仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 合并数据格式化 IP:PORT#地区码（兼容--/----脏后缀）
        run: |
          shopt -s nullglob nocaseglob
          FILES=(as*.txt)
          echo "=== 当前目录txt文件 ==="
          ls -la *.txt || echo "无txt文件"
          echo "匹配到AS/as文件总数：${#FILES[@]}"
          echo "文件列表：${FILES[*]}"

          # 无源文件直接退出，彻底杜绝cat空参数exit code 2报错
          if [[ ${#FILES[@]} -eq 0 ]]; then
            echo "✅ 未找到任何as/AS开头txt文件，任务正常结束"
            exit 0
          fi

          # 合并原有ip.txt历史数据 + 所有AS/as文件
          (cat ip.txt 2>/dev/null; cat "${FILES[@]}" 2>/dev/null) \
          # 删除行首数字序号+空格
          | sed -E 's/^[0-9]+\s+//' \
          # 仅保留带#的有效行
          | awk '/#/' \
          # #后按"-"分割，强制取第二段地区码，兼容--、----后缀脏数据
          | awk -F '#' '{
              split($2, parts, "-");
              area = parts[2];
              # 仅过滤完全无第二段的畸形行，HKG-HK--、TPE-TW----均可正常输出
              if (area != "") {
                print $1"#"area
              }
            }' \
          # 全局排序去重
          | sort -u \
          # 删除空行
          | sed '/^$/d' > ip.txt.tmp

          # 临时文件中转，防止脚本中断丢失数据
          mv ip.txt.tmp ip.txt
          echo "✅ 处理完成，ip.txt有效总行数：$(wc -l < ip.txt)"

      - name: 提交推送更新ip.txt
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ip.txt
          if git diff --cached --quiet; then
            echo "ℹ️ ip.txt无变更，跳过提交推送"
          else
            git commit -m "auto merge AS/as files, format IP:PORT#area-code, support --/---- dirty suffix"
            git push
            echo "🚀 已推送最新ip.txt至main分支"
          fi