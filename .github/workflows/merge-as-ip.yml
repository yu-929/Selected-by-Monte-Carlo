name: Merge AS TXT to ip.txt
on:
  push:
    branches: [ main ]
    paths:
      - 'as*.txt'
      - 'ip.txt'
  workflow_dispatch:

# 解决403推送权限
permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 转换格式、合并、去重写入ip.txt
        run: |
          # 核心逻辑：
          # 1.读取所有as开头文件
          # 2.每行去除开头行号数字 1  xxx → xxx
          # 3.截取#前IP端口，#后取第二段国家码拼接成 IP:端口#JP
          # 4.全局去重、删除空行输出ip.txt
          cat as*.txt \
          | sed -E 's/^[0-9]+\s+//' \
          | awk -F '#' '{split($2,tag,"-");print $1"#"tag[2]}' \
          | sort -u \
          | sed '/^$/d' > ip.txt
          echo "格式转换+合并去重完成，输出至ip.txt"

      - name: 提交更新后的ip.txt
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ip.txt
          # 无变更跳过提交
          if git diff --cached --quiet; then
            echo "ip.txt无变化，跳过提交推送"
          else
            git commit -m "auto convert format + merge all as*.txt deduplicate to ip.txt"
            git push
          fi