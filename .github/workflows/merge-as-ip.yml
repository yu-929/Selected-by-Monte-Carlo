name: Merge AS TXT to ip.txt
on:
  push:
    branches: [ main ]
    paths:
      - 'as*.txt'
      - 'ip.txt'
  workflow_dispatch:

# 关键修复：赋予读写仓库权限
permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 合并as开头文件并去重写入ip.txt
        run: |
          # 合并所有as*.txt、全局去重、清理空行覆盖ip.txt
          cat as*.txt | sort -u | sed '/^$/d' > ip.txt
          echo "合并完成，已去重并清理空行"

      - name: 提交更新后的ip.txt
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ip.txt
          # 仅当存在变更时提交推送
          if git diff --cached --quiet; then
            echo "ip.txt无变化，跳过提交"
          else
            git commit -m "auto merge all as*.txt and deduplicate to ip.txt"
            git push
          fi