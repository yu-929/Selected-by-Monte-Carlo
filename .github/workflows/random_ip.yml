name: Random Pick 1000 IPs
on:
  workflow_dispatch:

jobs:
  pick-ip-task:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 随机抽取1000条IP并保存至best.txt
        run: |
          python3 << EOF
          import random
          # 读取原始ip.txt
          with open("ip.txt", "r", encoding="utf-8") as f:
              ip_list = [line.strip() for line in f if line.strip()]
          sample_count = min(1000, len(ip_list))
          selected_ips = random.sample(ip_list, sample_count)
          # 输出修改为 best.txt
          with open("best.txt", "w", encoding="utf-8") as out:
              out.write("\n".join(selected_ips))
          print(f"已抽取 {sample_count} 条IP，保存至 best.txt")
          EOF

      - name: 上传best.txt结果文件
        uses: actions/upload-artifact@v4
        with:
          name: best-ip-file
          path: best.txt