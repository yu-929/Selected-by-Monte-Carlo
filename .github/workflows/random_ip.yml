name: Random Pick 1000 IPs
# 仅支持手动触发运行
on:
  workflow_dispatch:

jobs:
  pick-ip-task:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 随机抽取1000条IP
        run: |
          import random
          # 读取原始ip.txt
          with open("ip.txt", "r", encoding="utf-8") as f:
              ip_list = [line.strip() for line in f if line.strip()]
          # 随机采样最多1000条（不足则取全部）
          sample_count = min(1000, len(ip_list))
          selected_ips = random.sample(ip_list, sample_count)
          # 输出结果文件
          with open("ip_selected_1000.txt", "w", encoding="utf-8") as out:
              out.write("\n".join(selected_ips))
          print(f"已抽取 {sample_count} 条IP，保存至 ip_selected_1000.txt")

      - name: 上传抽取结果文件
        uses: actions/upload-artifact@v4
        with:
          name: selected-ips-file
          path: ip_selected_1000.txt